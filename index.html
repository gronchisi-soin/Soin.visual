<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soin.visual</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      scroll-behavior: smooth;
    }


    body {
      background: #fff;
      font-family: Helvetica Neue, Helvetica, Arial, sans-serif;
      color: #000;
    }

    .wrapper {
      max-width: 1400px;
      margin: 0 auto;
      padding: 80px 20px 20px;
    }

    /* HEADER */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: #fff;
      z-index: 1000;
      border-bottom: 1px solid #000;
    }

    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 10px 20px;
    }

    .header h1 {
      font-size: 25px;
      font-weight: 500;
    }

    /* INTRO */
    .intro {
      max-width: 700px;
      margin-bottom: 60px;
    }

    .intro p {
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .intro a {
      display: block;
      font-size: 14px;
      color: #000;
      text-decoration: none;
      margin-bottom: 10px;
      font-weight: bold;
    }

    /* GALLERY */
    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      align-items: start;
      margin-bottom: 50px;
    }

    .gallery-item {
      position: relative;
      align-self: start;
    }

    .gallery-item img {
      width: 100%;
      display: block;
      cursor: pointer;
      user-select: none;
    }

    @media (max-width: 1000px) {
      .gallery {
        grid-template-columns: repeat(2, 1fr);
      }
    }

@media (max-width: 768px) {
  body.no-scroll {
    overflow: hidden;
    touch-action: none;
  }
}

    @media (max-width: 600px) {
      .gallery {
        grid-template-columns: 1fr;
      }
    }

    /* FOOTER */
    .footer-link {
      display: block;
      font-size: 14px;
      color: #000;
      text-decoration: none;
      font-weight: bold;
      margin-top: 10px;
      margin-bottom: 150px;
      padding: 0px;
    }

    /* LIGHTBOX */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      touch-action: pan-y;
    }

    .lightbox.active,
    .lightbox.closing {
      pointer-events: auto;
    }

    .lightbox-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.82);
      opacity: 0;
      transition: opacity 0.35s ease;
    }

    .lightbox.active .lightbox-backdrop {
      opacity: 1;
    }

    .lightbox.closing .lightbox-backdrop {
      opacity: 0;
    }

    .lightbox-stage {
      position: fixed;
      left: 0;
      top: 0;
      width: 0;
      height: 0;
      opacity: 0;
      z-index: 2;
      overflow: hidden;
      will-change: left, top, width, height, opacity;
      transition:
        left 0.45s cubic-bezier(.22,.61,.36,1),
        top 0.45s cubic-bezier(.22,.61,.36,1),
        width 0.45s cubic-bezier(.22,.61,.36,1),
        height 0.45s cubic-bezier(.22,.61,.36,1),
        opacity 0.15s linear;
      touch-action: pan-y;
    }

    .lightbox.active .lightbox-stage,
    .lightbox.closing .lightbox-stage {
      opacity: 1;
    }

    .lightbox-stage-viewport {
      position: absolute;
      inset: 0;
      overflow: hidden;
      touch-action: pan-y;
    }

    .lightbox-track {
      display: flex;
      width: 300%;
      height: 100%;
      transform: translate3d(-33.333333%, 0, 0);
      will-change: transform;
      touch-action: pan-y;
    }

    .lightbox-slide {
      width: 33.333333%;
      flex: 0 0 33.333333%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .lightbox-slide img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      pointer-events: none;
      user-select: none;
    }

    .lightbox-close,
    .nav {
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .lightbox.active .lightbox-close,
    .lightbox.active .nav,
    .lightbox.closing .lightbox-close,
    .lightbox.closing .nav {
      opacity: 1;
    }

    .lightbox-close {
      position: fixed;
      top: 20px;
      right: 30px;
      font-size: 34px;
      line-height: 1;
      color: #000;
      cursor: pointer;
      z-index: 3;
      background: none;
      border: 0;
      padding: 0;
    }

    .nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      z-index: 3;
      background: none;
      border: 0;
      padding: 0;
    }

    .nav.left {
      left: 20px;
    }

    .nav.right {
      right: 20px;
    }

    .nav img {
      width: 20px;
      display: block;
    }

    @media (max-width: 768px) {
      .nav {
        display: none;
      }

      .lightbox-close {
        top: 16px;
        right: 20px;
      }
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="header-inner">
      <h1>Soin.visual</h1>
    </div>
  </div>

  <div class="wrapper">
    <div class="intro">
      <p>Soin. is a creative atelier based on architectural visualisation.</p>
      <a href="mailto:info@soinvisual.com">info@soinvisual.com</a>
      <a href="https://www.instagram.com/soin.visual/" target="_blank" rel="noopener noreferrer">Instagram</a>
    </div>

    <div class="gallery">
      <div class="gallery-item"><img src="img/image1.jpg" data-full="img/image1.jpg" alt="Image 1"></div>
      <div class="gallery-item"><img src="img/image2.jpg" data-full="img/image2.jpg" alt="Image 2"></div>
      <div class="gallery-item"><img src="img/image3.jpg" data-full="img/image3.jpg" alt="Image 3"></div>
      <div class="gallery-item"><img src="img/image4.jpg" data-full="img/image4.jpg" alt="Image 4"></div>
      <div class="gallery-item"><img src="img/image5.jpg" data-full="img/image5.jpg" alt="Image 5"></div>
      <div class="gallery-item"><img src="img/image6.jpg" data-full="img/image6.jpg" alt="Image 6"></div>
      <div class="gallery-item"><img src="img/image7.jpg" data-full="img/image7.jpg" alt="Image 7"></div>
      <div class="gallery-item"><img src="img/image8.jpg" data-full="img/image8.jpg" alt="Image 8"></div>
      <div class="gallery-item"><img src="img/image9.jpg" data-full="img/image9.jpg" alt="Image 9"></div>
    </div>


    <a href="#" class="footer-link">Back to top</a>
  </div>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox" aria-hidden="true">
    <div class="lightbox-backdrop" id="backdrop"></div>

    <button class="lightbox-close" id="closeBtn" aria-label="Chiudi lightbox">&times;</button>

    <button class="nav left" id="prev" aria-label="Immagine precedente">
      <img src="img/arrow-left-black.png" alt="">
    </button>

    <div class="lightbox-stage" id="stage">
      <div class="lightbox-stage-viewport" id="stageViewport">
        <div class="lightbox-track" id="stageTrack">
          <div class="lightbox-slide"><img id="slidePrev" src="" alt=""></div>
          <div class="lightbox-slide"><img id="slideCurrent" src="" alt=""></div>
          <div class="lightbox-slide"><img id="slideNext" src="" alt=""></div>
        </div>
      </div>
    </div>

    <button class="nav right" id="next" aria-label="Immagine successiva">
      <img src="img/arrow-right-black.png" alt="">
    </button>
  </div>

<script>
  // RANDOMIZZAZIONE GALLERIA
  const gallery = document.querySelector('.gallery');
  const items = Array.from(gallery.children);

  items
    .sort(() => Math.random() - 0.5)
    .forEach(item => gallery.appendChild(item));

    const thumbs = [...document.querySelectorAll('.gallery-item img')];
    const lightbox = document.getElementById('lightbox');
    const backdrop = document.getElementById('backdrop');
    const stage = document.getElementById('stage');
    const stageViewport = document.getElementById('stageViewport');
    const stageTrack = document.getElementById('stageTrack');
    const slidePrev = document.getElementById('slidePrev');
    const slideCurrent = document.getElementById('slideCurrent');
    const slideNext = document.getElementById('slideNext');
    const closeBtn = document.getElementById('closeBtn');
    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');

    let currentIndex = 0;
    let isNavigating = false;

    let pointerDown = false;
    let pointerId = null;
    let startX = 0;
    let startY = 0;
    let currentDeltaX = 0;
    let isDraggingCarousel = false;
    let gestureLocked = false;
    let gestureAxis = null;

    const MARGIN = 24;
    const MULTI_ROW_TARGET_Y = 0.50;
    const SINGLE_ROW_TARGET_Y = 0.50;
    const ROW_TOLERANCE = 4;

    const CENTER_PERCENT = -33.333333;
    const PREV_PERCENT = 0;
    const NEXT_PERCENT = -66.666666;

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function getThumb(index) {
      return thumbs[index];
    }

    function normalizeIndex(index) {
      return (index + thumbs.length) % thumbs.length;
    }

    function getPrevIndex(index) {
      return normalizeIndex(index - 1);
    }

    function getNextIndex(index) {
      return normalizeIndex(index + 1);
    }

    function getThumbRect(index) {
      return getThumb(index).getBoundingClientRect();
    }

    function getImageData(index) {
      const img = getThumb(index);
      return {
        src: img.dataset.full || img.src,
        alt: img.alt || ''
      };
    }

    function setImgElement(imgEl, data) {
      imgEl.src = data.src;
      imgEl.alt = data.alt;
    }

    function updateSlides(index) {
      setImgElement(slidePrev, getImageData(getPrevIndex(index)));
      setImgElement(slideCurrent, getImageData(index));
      setImgElement(slideNext, getImageData(getNextIndex(index)));
    }

    function setTrackTranslatePx(deltaX, immediate = false) {
      if (immediate) {
        stageTrack.style.transition = 'none';
      }
      stageTrack.style.transform = `translate3d(calc(${CENTER_PERCENT}% + ${deltaX}px), 0, 0)`;
      if (immediate) {
        stageTrack.offsetHeight;
      }
    }

    function setTrackPercent(percent, animated = true) {
      stageTrack.style.transition = animated ? 'transform 0.70s cubic-bezier(.22,.61,.36,1)' : 'none';
      stageTrack.style.transform = `translate3d(${percent}%, 0, 0)`;
    }

    function resetTrackToCenter(immediate = true) {
      setTrackPercent(CENTER_PERCENT, !immediate ? true : false);
      if (immediate) {
        stageTrack.offsetHeight;
      }
    }

    function getRowsData() {
      const items = thumbs.map((img, index) => ({
        index,
        rect: img.getBoundingClientRect()
      }));

      const rows = [];

      items.forEach(item => {
        let row = rows.find(r => Math.abs(r.anchorTop - item.rect.top) <= ROW_TOLERANCE);

        if (!row) {
          row = { anchorTop: item.rect.top, items: [] };
          rows.push(row);
        }

        row.items.push(item);
      });

      rows.sort((a, b) => a.anchorTop - b.anchorTop);

      return rows.map(row => {
        const top = Math.min(...row.items.map(item => item.rect.top));
        const maxHeight = Math.max(...row.items.map(item => item.rect.height));
        const indices = row.items.map(item => item.index);

        return {
          indices,
          count: row.items.length,
          top,
          maxHeight,
          centerY: top + maxHeight / 2
        };
      });
    }

    function getRowInfoByIndex(index) {
      const rows = getRowsData();
      return rows.find(row => row.indices.includes(index));
    }

    function isSingleImageRow(index) {
      const row = getRowInfoByIndex(index);
      return row && row.count === 1;
    }

    function getMultiImageStageRect(index) {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const img = getThumb(index);

      const naturalW = img.naturalWidth || img.width || 1600;
      const naturalH = img.naturalHeight || img.height || 1000;
      const ratio = naturalW / naturalH;

      let width = vw - MARGIN * 2;
      let height = width / ratio;

      if (height > vh - MARGIN * 2) {
        height = vh - MARGIN * 2;
        width = height * ratio;
      }

      return {
        left: (vw - width) / 2,
        top: (vh - height) / 2,
        width,
        height
      };
    }

    function getSingleImageStageRect(index) {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const rect = getThumbRect(index);

      return {
        left: (vw - rect.width) / 2,
        top: (vh - rect.height) / 2,
        width: rect.width,
        height: rect.height
      };
    }

    function getStageRect(index) {
      return isSingleImageRow(index) ? getSingleImageStageRect(index) : getMultiImageStageRect(index);
    }

    function applyRect(rect, immediate = false) {
      if (immediate) {
        stage.style.transition = 'none';
      } else {
        stage.style.transition = '';
      }

      stage.style.left = rect.left + 'px';
      stage.style.top = rect.top + 'px';
      stage.style.width = rect.width + 'px';
      stage.style.height = rect.height + 'px';

      if (immediate) {
        stage.offsetHeight;
        stage.style.transition = '';
      }
    }

    function alignCurrentImageOrRow(index, behavior = 'smooth') {
      const row = getRowInfoByIndex(index);
      const thumbRect = getThumbRect(index);

      if (!row) return;

      const referenceCenterY =
        row.count === 1
          ? thumbRect.top + thumbRect.height / 2
          : row.centerY;

      const targetY =
        row.count === 1
          ? window.innerHeight * SINGLE_ROW_TARGET_Y
          : window.innerHeight * MULTI_ROW_TARGET_Y;

      const delta = referenceCenterY - targetY;
      const targetScroll = window.scrollY + delta;
      const maxScroll = document.documentElement.scrollHeight - window.innerHeight;

      window.scrollTo({
        top: clamp(targetScroll, 0, Math.max(0, maxScroll)),
        behavior
      });
    }

    function openLightbox(index) {
      currentIndex = index;
      isNavigating = false;
      updateSlides(currentIndex);
      resetTrackToCenter(true);

      const fromRect = getThumbRect(index);
      applyRect(fromRect, true);

      lightbox.classList.remove('closing');
      lightbox.classList.add('active');
      lightbox.setAttribute('aria-hidden', 'false');
document.body.classList.add('no-scroll');

      requestAnimationFrame(() => {
        applyRect(getStageRect(index));

        setTimeout(() => {
          alignCurrentImageOrRow(index, 'smooth');
        }, 40);
      });
    }

    function closeLightbox() {
      if (isNavigating || pointerDown) return;

      lightbox.classList.add('closing');
      lightbox.setAttribute('aria-hidden', 'true');

      applyRect(getThumbRect(currentIndex));

      setTimeout(() => {
        lightbox.classList.remove('active', 'closing');
document.body.classList.remove('no-scroll');
      }, 460);
    }

    function finalizeNavigation(newIndex) {
      currentIndex = normalizeIndex(newIndex);
      updateSlides(currentIndex);
      resetTrackToCenter(true);
      applyRect(getStageRect(currentIndex), true);
      isNavigating = false;
    }

    function animateToTarget(targetPercent, nextIndex) {
      if (isNavigating) return;
      isNavigating = true;

      applyRect(getStageRect(normalizeIndex(nextIndex)));
      alignCurrentImageOrRow(normalizeIndex(nextIndex), 'smooth');

      const onEnd = (event) => {
        if (event.target !== stageTrack || event.propertyName !== 'transform') return;
        stageTrack.removeEventListener('transitionend', onEnd);
        finalizeNavigation(nextIndex);
      };

      stageTrack.addEventListener('transitionend', onEnd);
      setTrackPercent(targetPercent, true);
    }

    function goTo(index) {
      const normalized = normalizeIndex(index);
      if (normalized === currentIndex) return;

      if (normalized === getNextIndex(currentIndex)) {
        animateToTarget(NEXT_PERCENT, normalized);
        return;
      }

      if (normalized === getPrevIndex(currentIndex)) {
        animateToTarget(PREV_PERCENT, normalized);
        return;
      }

      currentIndex = normalized;
      updateSlides(currentIndex);
      resetTrackToCenter(true);
      applyRect(getStageRect(currentIndex), true);
      alignCurrentImageOrRow(currentIndex, 'smooth');
    }

    function onPointerDown(e) {
      if (!lightbox.classList.contains('active')) return;
      if (isNavigating) return;

      if (
        e.target.closest('#closeBtn') ||
        e.target.closest('#prev') ||
        e.target.closest('#next')
      ) {
        return;
      }

      pointerDown = true;
      pointerId = e.pointerId;
      startX = e.clientX;
      startY = e.clientY;
      currentDeltaX = 0;
      isDraggingCarousel = false;
      gestureLocked = false;
      gestureAxis = null;

      stageTrack.style.transition = 'none';
    }

    function onPointerMove(e) {
      if (!pointerDown || e.pointerId !== pointerId) return;
      if (!lightbox.classList.contains('active')) return;
      if (isNavigating) return;

      const deltaX = e.clientX - startX;
      const deltaY = e.clientY - startY;

      if (!gestureLocked) {
        if (Math.abs(deltaX) > 8 || Math.abs(deltaY) > 8) {
          gestureLocked = true;
          gestureAxis = Math.abs(deltaX) > Math.abs(deltaY) ? 'x' : 'y';
        } else {
          return;
        }
      }

      if (gestureAxis !== 'x') {
        return;
      }

      isDraggingCarousel = true;
      currentDeltaX = deltaX;

      setTrackTranslatePx(deltaX, true);
      e.preventDefault();
    }

    function onPointerUp(e) {
      if (!pointerDown || e.pointerId !== pointerId) return;

      pointerDown = false;

      if (!isDraggingCarousel || gestureAxis !== 'x') {
        isDraggingCarousel = false;
        gestureLocked = false;
        gestureAxis = null;
        setTrackPercent(CENTER_PERCENT, true);
        return;
      }

      const viewportWidth = window.innerWidth || 1;
      const threshold = Math.min(140, viewportWidth * 0.18);
      const deltaX = currentDeltaX;

      isDraggingCarousel = false;
      gestureLocked = false;
      gestureAxis = null;
      currentDeltaX = 0;

      if (deltaX <= -threshold) {
        animateToTarget(NEXT_PERCENT, getNextIndex(currentIndex));
      } else if (deltaX >= threshold) {
        animateToTarget(PREV_PERCENT, getPrevIndex(currentIndex));
      } else {
        setTrackPercent(CENTER_PERCENT, true);
      }
    }

    function onPointerCancel(e) {
      if (!pointerDown || e.pointerId !== pointerId) return;

      pointerDown = false;
      isDraggingCarousel = false;
      gestureLocked = false;
      gestureAxis = null;
      currentDeltaX = 0;

      setTrackPercent(CENTER_PERCENT, true);
    }

    thumbs.forEach((img, index) => {
      img.addEventListener('click', () => {
        openLightbox(index);
      });
    });

    nextBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      goTo(getNextIndex(currentIndex));
    });

    prevBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      goTo(getPrevIndex(currentIndex));
    });

    closeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      closeLightbox();
    });

    backdrop.addEventListener('click', closeLightbox);

    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('active')) return;
      if (isNavigating) return;

      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowRight') goTo(getNextIndex(currentIndex));
      if (e.key === 'ArrowLeft') goTo(getPrevIndex(currentIndex));
    });

    window.addEventListener('resize', () => {
      if (!lightbox.classList.contains('active')) return;
      if (isNavigating || pointerDown) return;

      applyRect(getStageRect(currentIndex), true);
      alignCurrentImageOrRow(currentIndex, 'auto');
      updateSlides(currentIndex);
      resetTrackToCenter(true);
    });

    lightbox.addEventListener('pointerdown', onPointerDown, { passive: true });
    lightbox.addEventListener('pointermove', onPointerMove, { passive: false });
    lightbox.addEventListener('pointerup', onPointerUp);
    lightbox.addEventListener('pointercancel', onPointerCancel);
    lightbox.addEventListener('lostpointercapture', onPointerCancel);
  </script>
</body>
</html>

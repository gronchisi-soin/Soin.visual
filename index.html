<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soin.visual</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #fff;
      font-family: Helvetica Neue, sans-serif;
    }

    .wrapper {
      max-width: 1400px;
      margin: 0 auto;
      padding: 80px 20px 20px; /* spazio per header fisso */
    }

    /* HEADER FIXED SOLO TITOLO */
    .header {
      position: fixed;
      width: 100%;
      background: #fff;
      z-index: 1000;
      padding: 20px 20px;
      border-bottom: 1px;
    }

    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .header h1 {
      font-size: 25px;
    }

    /* CONTENUTO HEADER (sotto) */
    .intro {
      max-width: 700px;
      margin-bottom: 60px;
    }

    .intro p {
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .intro a {
      display: block;
      font-size: 14px;
      color: #000;
      text-decoration: none;
      margin-bottom: 10px;
      font-weight: bold;
    }

    /* GALLERY */
    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .gallery-item img {
      width: 100%;
      display: block;
      cursor: pointer;
    }

    @media (max-width: 1000px) {
      .gallery {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 600px) {
      .gallery {
        grid-template-columns: 1fr;
      }
    }

    /* LIGHTBOX */
    .lightbox {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      flex-direction: column;
    }

    .lightbox.active {
      display: flex;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 90%;
      user-select: none;
    }

    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 30px;
      color: #fff;
      cursor: pointer;
    }

    .nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 40px;
      color: #fff;
      cursor: pointer;
      padding: 10px;
      user-select: none;
    }

    .nav.left {
      left: 20px;
    }

    .nav.right {
      right: 20px;
    }

    .nav img {
      width: 30px;
      height: 30px;
      object-fit: contain;
      pointer-events: none;
    }

    /* BACK TO TOP */
    .footer-link {
      display: block;
      font-size: 14px;
      color: #000;
      text-decoration: none;
      font-weight: bold;
      margin-top: 60px;
    }

  </style>
</head>

<body>

<!-- HEADER FIXED -->
<div class="header">
  <div class="header-inner">
    <h1>Soin.visual</h1>
  </div>
</div>

<div class="wrapper">

  <!-- INTRO (ex header) -->
  <div class="intro">
    <p>
      Soin. is a creative atelier based on architectural visualisation.
    </p>

    <a href="mailto:info@soinvisual.com">info@soinvisual.com</a>
    <a href="https://www.instagram.com/soin.visual/" target="_blank">Instagram</a>
  </div>

  <div class="gallery">
    <div class="gallery-item"><img src="img/image1.jpg"></div>
    <div class="gallery-item"><img src="img/image2.jpg"></div>
    <div class="gallery-item"><img src="img/image3.jpg"></div>
    <div class="gallery-item"><img src="img/image4.jpg"></div>
    <div class="gallery-item"><img src="img/image5.jpg"></div>
    <div class="gallery-item"><img src="img/image6.jpg"></div>
    <div class="gallery-item"><img src="img/image7.jpg"></div>
    <div class="gallery-item"><img src="img/image8.jpg"></div>
    <div class="gallery-item"><img src="img/image9.jpg"></div>
  </div>

  <a href="#" id="backToTop" class="footer-link">Back to top</a>

</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <span class="lightbox-close" id="closeBtn">&times;</span>
  <span class="nav left" id="prev">
    <img src="img/arrow-white-left.png" alt="Prev">
  </span>
  <img id="lightboxImg" src="">
  <span class="nav right" id="next">
    <img src="img/arrow-white-right.png" alt="Next">
  </span>
</div>

<script>
  const images = document.querySelectorAll('.gallery-item img');
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightboxImg');
  const closeBtn = document.getElementById('closeBtn');
  const prevBtn = document.getElementById('prev');
  const nextBtn = document.getElementById('next');

  let currentIndex = 0;

  const imageArray = Array.from(images).map(img => img.src);

  function showImage(index) {
    currentIndex = index;
    lightboxImg.src = imageArray[currentIndex];
  }

  images.forEach((img, index) => {
    img.addEventListener('click', () => {
      lightbox.classList.add('active');
      showImage(index);
    });
  });

  function closeLightbox() {
    lightbox.classList.remove('active');
    lightboxImg.src = '';
  }

  closeBtn.addEventListener('click', closeLightbox);

  prevBtn.addEventListener('click', () => {
    currentIndex = (currentIndex - 1 + imageArray.length) % imageArray.length;
    showImage(currentIndex);
  });

  nextBtn.addEventListener('click', () => {
    currentIndex = (currentIndex + 1) % imageArray.length;
    showImage(currentIndex);
  });

  lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox) closeLightbox();
  });

  document.addEventListener('keydown', (e) => {
    if (!lightbox.classList.contains('active')) return;

    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowRight') nextBtn.click();
    if (e.key === 'ArrowLeft') prevBtn.click();
  });

  let startX = 0;

  lightbox.addEventListener('touchstart', (e) => {
    startX = e.touches[0].clientX;
  });

  lightbox.addEventListener('touchend', (e) => {
    let endX = e.changedTouches[0].clientX;
    let diff = startX - endX;

    if (Math.abs(diff) > 50) {
      if (diff > 0) {
        nextBtn.click();
      } else {
        prevBtn.click();
      }
    }
  });

  imageArray.forEach(src => {
    const img = new Image();
    img.src = src;
  });
</script>

<script>
  const gallery = document.querySelector('.gallery');

  function shuffleGallery() {
    const items = Array.from(gallery.children);

    for (let i = items.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [items[i], items[j]] = [items[j], items[i]];
    }

    items.forEach(item => gallery.appendChild(item));
  }

  shuffleGallery();
</script>

</body>
</html>
